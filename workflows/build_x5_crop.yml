name: Build X5 Crop Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'x5-crop-v*'

jobs:
  build-macos:
    name: macOS app bundle
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Build macOS app
        run: ./tools/build_macos_app.sh
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: X5_Crop_macOS
          path: |
            release/X5_Crop_macOS_app.zip
            release/X5_Crop_macOS.dmg

  build-windows:
    name: Windows app folder
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Build Windows app
        shell: pwsh
        run: .\tools\build_windows_app.ps1
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: X5_Crop_Windows
          path: release/X5_Crop_Windows_app.zip
