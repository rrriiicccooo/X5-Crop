name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install runtime dependencies
        run: python -m pip install numpy tifffile imagecodecs Pillow
      - name: Run repository verifier
        run: tools/verify full
