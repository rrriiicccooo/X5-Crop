name: Build X5 Crop Desktop Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'x5-crop-v*'

permissions:
  contents: read

jobs:
  build-macos:
    name: macOS app bundle
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements_X5_Crop_v1_1.txt

      - name: Build macOS app
        shell: bash
        run: |
          chmod +x tools/build_macos_app.sh
          ./tools/build_macos_app.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: X5_Crop_macOS
          path: |
            release/X5_Crop_macOS_app.zip
            release/X5_Crop_macOS.dmg
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Windows app folder
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements_X5_Crop_v1_1.txt

      - name: Build Windows app
        shell: pwsh
        run: .\tools\build_windows_app.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: X5_Crop_Windows
          path: release/X5_Crop_Windows_app.zip
          if-no-files-found: error
          retention-days: 14
