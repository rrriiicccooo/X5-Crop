  <text x="1142" y="438" class="text small">Weak separator near frame 3</text>
  <rect x="1124" y="466" width="264" height="46" rx="10" fill="#fff4dc"/>
  <text x="1142" y="494" class="text small">Frame width variance is high</text>

  <text x="1124" y="558" class="dim label">CROP PLAN</text>
  <text x="1124" y="588" class="text small">Frame count</text>
  <text x="1370" y="588" class="muted small" text-anchor="end">6</text>
  <text x="1124" y="622" class="text small">Bleed</text>
  <text x="1370" y="622" class="muted small" text-anchor="end">10 px</text>
  <text x="1124" y="656" class="text small">Deskew</text>
  <text x="1370" y="656" class="muted small" text-anchor="end">-0.18 deg</text>

