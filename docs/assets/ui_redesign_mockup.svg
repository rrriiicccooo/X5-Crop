  <rect x="60" y="622" width="48" height="28" rx="4" fill="url(#thumb)"/>
  <text x="122" y="630" class="text small">X5 023.tif</text>
  <text x="122" y="650" class="muted tiny">92% · approved</text>
  <circle cx="250" cy="636" r="8" class="green"/>
  <rect x="44" y="678" width="232" height="56" rx="10" fill="#ffffff"/>
  <rect x="60" y="692" width="48" height="28" rx="4" fill="url(#thumb)"/>
