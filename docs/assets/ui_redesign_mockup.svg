  <line x1="484" y1="306" x2="484" y2="500" class="split"/>
  <line x1="584" y1="306" x2="584" y2="500" class="split"/>
  <line x1="684" y1="306" x2="684" y2="500" class="split"/>
  <line x1="784" y1="306" x2="784" y2="500" class="split"/>
  <line x1="884" y1="306" x2="884" y2="500" class="split"/>
  <line x1="434" y1="306" x2="434" y2="500" class="grid"/>
  <line x1="534" y1="306" x2="534" y2="500" class="grid"/>
  <line x1="634" y1="306" x2="634" y2="500" class="grid"/>
  <line x1="734" y1="306" x2="734" y2="500" class="grid"/>
  <line x1="834" y1="306" x2="834" y2="500" class="grid"/>
  <line x1="386" y1="328" x2="984" y2="318" class="guide"/>
  <line x1="386" y1="480" x2="984" y2="492" class="guide"/>
  <rect x="392" y="314" width="92" height="186" class="crop"/>
  <rect x="492" y="314" width="92" height="186" class="crop"/>
  <rect x="592" y="314" width="92" height="186" class="crop"/>
  <rect x="692" y="314" width="92" height="186" class="crop"/>
  <rect x="792" y="314" width="92" height="186" class="crop"/>
  <rect x="892" y="314" width="92" height="186" class="crop"/>
  <text x="438" y="422" class="text title" text-anchor="middle" opacity="0.72">1</text>
  <text x="538" y="422" class="text title" text-anchor="middle" opacity="0.72">2</text>
  <text x="638" y="422" class="text title" text-anchor="middle" opacity="0.72">3</text>
  <text x="738" y="422" class="text title" text-anchor="middle" opacity="0.72">4</text>
  <text x="838" y="422" class="text title" text-anchor="middle" opacity="0.72">5</text>
  <text x="938" y="422" class="text title" text-anchor="middle" opacity="0.72">6</text>

  <rect x="388" y="596" width="630" height="92" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  <text x="412" y="628" class="dim label">REVIEW NOTE</text>
  <text x="412" y="654" class="muted small">Confidence: 56%. Weak separator around frame 3.</text>
  <text x="412" y="676" class="muted small">Drag the red line, or approve if the crop looks right.</text>

  <rect x="1100" y="90" width="312" height="714" class="inspector"/>
