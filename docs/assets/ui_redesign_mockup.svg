    <rect x="0" y="0" width="34" height="34" rx="8" class="toolbarItem"/>
    <path d="M20 10l-8 7 8 7" class="symbol"/>
  </g>
  <g transform="translate(970 39)">
    <rect x="0" y="0" width="34" height="34" rx="8" class="toolbarItem"/>
    <path d="M14 10l8 7-8 7" class="symbol"/>
  </g>
  <g transform="translate(1030 39)">
    <rect x="0" y="0" width="92" height="34" rx="8" class="toolbarItem"/>
    <circle cx="18" cy="16" r="6" class="symbol"/>
    <path d="M22.5 20.5l5 5M13 16h10M16 13v6" class="symbol"/>
    <text x="58" y="22" class="text small" text-anchor="middle">Analyze</text>
  </g>
  <g transform="translate(1134 39)">
    <rect x="0" y="0" width="96" height="34" rx="8" class="primary"/>
    <circle cx="20" cy="17" r="8" class="symbolWhite"/>
    <path d="M16.5 17.5l3 3 5.5-6" class="symbolWhite"/>
    <text x="62" y="22" fill="#ffffff" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" text-anchor="middle">Approve</text>
  </g>
  <g transform="translate(1242 39)">
    <rect x="0" y="0" width="34" height="34" rx="8" class="toolbarItem"/>
    <path d="M10 11h14M12 17h10M10 23h14M17 8v26" class="symbol"/>
  </g>
  <g transform="translate(1286 39)">
    <rect x="0" y="0" width="34" height="34" rx="8" class="toolbarItem"/>
    <path d="M10 10h14v14H10zM18 10v14M21 14h1.5M21 18h1.5M21 22h1.5" class="symbol"/>
  </g>
  <g transform="translate(1330 39)">
    <rect x="0" y="0" width="48" height="34" rx="8" class="toolbarItem"/>
    <path d="M24 9v13M18.5 16.5l5.5 5.5 5.5-5.5M14 25h20" class="symbol"/>
  </g>

  <rect x="28" y="90" width="264" height="714" class="panel"/>
  <text x="52" y="128" class="dim label">SOURCE</text>
  <rect x="52" y="146" width="216" height="38" rx="9" class="soft"/>
  <text x="72" y="170" class="text small">/Photography/X5 Test</text>
  <rect x="52" y="196" width="102" height="34" rx="8" class="sidebarAction" filter="url(#controlShadow)"/>
  <path d="M68 205h13l5 5v13H68zM81 205v6h6M72 216h10M77 211v10" class="symbol"/>
  <text x="113" y="218" class="text small" text-anchor="middle">File</text>
  <rect x="166" y="196" width="102" height="34" rx="8" class="sidebarAction" filter="url(#controlShadow)"/>
  <path d="M184 208h12l3 4h13v15h-28zM184 212h28" class="symbol"/>
  <text x="226" y="218" class="text small" text-anchor="middle">Folder</text>

  <text x="52" y="274" class="dim label">BATCH</text>
  <rect x="52" y="294" width="216" height="36" rx="8" fill="#edf3fb"/>
  <text x="72" y="317" class="text small">All scans</text>
  <text x="238" y="317" class="muted small" text-anchor="end">24</text>
  <rect x="52" y="338" width="216" height="36" rx="8" fill="#ffffff"/>
  <circle cx="72" cy="356" r="5" class="amber"/>
  <text x="88" y="361" class="text small">Needs review</text>
  <text x="238" y="361" class="muted small" text-anchor="end">5</text>
  <rect x="52" y="382" width="216" height="36" rx="8" fill="#ffffff"/>
  <circle cx="72" cy="400" r="5" class="green"/>
  <text x="88" y="405" class="text small">Approved</text>
  <text x="238" y="405" class="muted small" text-anchor="end">18</text>
  <rect x="52" y="426" width="216" height="36" rx="8" fill="#ffffff"/>
  <circle cx="72" cy="444" r="5" class="red"/>
  <text x="88" y="449" class="text small">Failed</text>
  <text x="238" y="449" class="muted small" text-anchor="end">1</text>

  <text x="52" y="520" class="dim label">QUEUE</text>
