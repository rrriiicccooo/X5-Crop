<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">X5 Crop macOS review workspace mockup</title>
  <desc id="desc">A light macOS-style crop review UI guided by Apple Human Interface Guidelines.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <filter id="controlShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="128%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="scan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#d6dde7"/>
      <stop offset="0.11" stop-color="#94a3b8"/>
      <stop offset="0.23" stop-color="#edf1f6"/>
      <stop offset="0.38" stop-color="#9aa7b8"/>
      <stop offset="0.52" stop-color="#f4f6f9"/>
      <stop offset="0.66" stop-color="#8798ad"/>
      <stop offset="0.82" stop-color="#e8edf4"/>
      <stop offset="1" stop-color="#a4afbf"/>
    </linearGradient>
    <linearGradient id="thumb" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#cfd7e3"/>
      <stop offset="0.5" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#aeb9c9"/>
    </linearGradient>
    <style>
      .bg { fill: #eef2f7; }
      .shell { fill: #f8fafc; stroke: none; }
      .top { fill: #fbfcfe; }
      .panel { fill: #f4f6fa; stroke: none; }
      .inspector { fill: #f7f8fb; stroke: none; }
      .soft { fill: #ffffff; stroke: none; }
      .canvas { fill: #fbfcfd; stroke: none; }
      .text { fill: #1f2937; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #667085; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .dim { fill: #98a2b3; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font-size: 12px; }
      .small { font-size: 14px; }
      .body { font-size: 16px; }
      .label { font-size: 12px; font-weight: 700; letter-spacing: 0; }
      .title { font-size: 20px; font-weight: 700; letter-spacing: 0; }
      .button { fill: #f3f5f8; stroke: none; }
      .sidebarAction { fill: #e9edf3; stroke: none; }
      .primary { fill: #3d6fb6; stroke: none; }
      .toolbarItem { fill: #f2f4f7; stroke: none; }
      .symbol { stroke: #475467; stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .symbolWhite { stroke: #ffffff; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .symbolFill { fill: #475467; }
      .brand { fill: #7f93b6; }
      .green { fill: #2f9e62; }
      .amber { fill: #d89b18; }
      .red { fill: #d94a42; }
      .blue { fill: #3d8bfd; }
      .crop { stroke: #3d8bfd; stroke-width: 2; fill: #3d8bfd; fill-opacity: 0.08; }
      .outer { stroke: #22a06b; stroke-width: 2; fill: none; }
      .split { stroke: #e85d5d; stroke-width: 2; }
      .grid { stroke: #8b6fd6; stroke-width: 1.5; stroke-dasharray: 6 6; opacity: 0.65; }
      .guide { stroke: #d89b18; stroke-width: 1.5; stroke-dasharray: 5 5; opacity: 0.72; }
    </style>
  </defs>

  <rect width="1440" height="900" class="bg"/>
  <rect x="28" y="24" width="1384" height="852" rx="18" class="shell" filter="url(#shadow)"/>

  <rect x="28" y="24" width="1384" height="66" rx="18" class="top"/>

  <g transform="translate(48 52)">
    <circle cx="0" cy="0" r="6.5" fill="#ff5f57"/>
    <circle cx="22" cy="0" r="6.5" fill="#ffbd2e"/>
    <circle cx="44" cy="0" r="6.5" fill="#28c840"/>
  </g>

  <rect x="122" y="39" width="34" height="34" rx="8" class="toolbarItem"/>
  <path d="M132 48h14M132 56h14M132 64h14M148 47v18" class="symbol"/>
  <text x="186" y="62" class="text title">X5 Crop</text>

  <rect x="585" y="39" width="270" height="34" rx="9" fill="#eceff4"/>
  <rect x="676" y="41" width="88" height="30" rx="7" fill="#ffffff" filter="url(#controlShadow)"/>
  <text x="630" y="62" class="muted small" text-anchor="middle">Library</text>
  <text x="720" y="62" class="text small" text-anchor="middle">Review</text>
  <text x="810" y="62" class="muted small" text-anchor="middle">Export</text>

